apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: insurance-app
  labels:
    app: notification-service
    tags.datadoghq.com/env: demo2
    tags.datadoghq.com/service: notification-service
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        tags.datadoghq.com/env: demo2
        tags.datadoghq.com/service: notification-service
        tags.datadoghq.com/version: "1.0.0"
        admission.datadoghq.com/enabled: "true"
      annotations:
        admission.datadoghq.com/enabled: "true"
    spec:
      containers:
      - name: notification-service
        image: wwongpai/insurance-notification-service:1.0.3
        ports:
        - containerPort: 8085
        env:
        - name: REDIS_HOST
          value: redis-service
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: password
        - name: PORT
          value: "8085"
        - name: DD_PROFILING_ENABLED
          value: "true"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 10
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: insurance-app
spec:
  selector:
    app: notification-service
  ports:
  - port: 8085
    targetPort: 8085
  type: ClusterIP
