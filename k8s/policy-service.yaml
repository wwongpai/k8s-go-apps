apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-service
  namespace: insurance-app
  labels:
    app: policy-service
    # Deployment.metadata.labels: Datadog Agent reads these for infrastructure metric tagging
    # (kube-state-metrics, pod CPU/memory/network metrics get these tags)
    tags.datadoghq.com/env: demo2
    tags.datadoghq.com/service: policy-service
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: policy-service
  template:
    metadata:
      labels:
        app: policy-service
        # Pod template labels: READ by Admission Controller at pod creation time
        # → injected as DD_ENV, DD_SERVICE, DD_VERSION env vars into the container
        tags.datadoghq.com/env: demo2
        tags.datadoghq.com/service: policy-service
        tags.datadoghq.com/version: "1.0.0"
        # Required as a LABEL for webhook objectSelector (matchLabels)
        admission.datadoghq.com/enabled: "true"
      annotations:
        # Also keep as annotation for compatibility (not Deployment metadata).
        # Admission Controller webhook fires on pod creation and reads pod spec.
        admission.datadoghq.com/enabled: "true"
    spec:
      containers:
      - name: policy-service
        image: wwongpai/insurance-policy-service:1.0.3
        ports:
        - containerPort: 8081
        env:
        # App-specific config only — NO DD_* vars here (Admission Controller handles those)
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: insurancedb
        - name: POSTGRES_USER
          value: insuranceuser
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: PORT
          value: "8081"
        # Only DD_* var you set explicitly — orchestrion added profiler code at build time
        - name: DD_PROFILING_ENABLED
          value: "true"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: policy-service
  namespace: insurance-app
spec:
  selector:
    app: policy-service
  ports:
  - port: 8081
    targetPort: 8081
  type: ClusterIP
