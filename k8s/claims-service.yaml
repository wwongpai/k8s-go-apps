apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-service
  namespace: insurance-app
  labels:
    app: claims-service
    tags.datadoghq.com/env: demo2
    tags.datadoghq.com/service: claims-service
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: claims-service
  template:
    metadata:
      labels:
        app: claims-service
        tags.datadoghq.com/env: demo2
        tags.datadoghq.com/service: claims-service
        tags.datadoghq.com/version: "1.0.0"
        admission.datadoghq.com/enabled: "true"
      annotations:
        admission.datadoghq.com/enabled: "true"
    spec:
      containers:
      - name: claims-service
        image: wwongpai/insurance-claims-service:1.0.3
        ports:
        - containerPort: 8082
        env:
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: insurancedb
        - name: POSTGRES_USER
          value: insuranceuser
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: REDIS_HOST
          value: redis-service
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: password
        - name: PORT
          value: "8082"
        - name: DD_PROFILING_ENABLED
          value: "true"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: claims-service
  namespace: insurance-app
spec:
  selector:
    app: claims-service
  ports:
  - port: 8082
    targetPort: 8082
  type: ClusterIP
